name: Sync AGENTS.md to downstream repos

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "agents-md/**"
      - "scripts/build-agents-md.sh"
      - "scripts/sync.sh"
      - ".github/workflows/sync.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no PRs created)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run sync
        env:
          # Token requires: contents:write (push branches), pull_requests:write (open PRs),
          # metadata:read (list repos) on all target repos in the org.
          GH_TOKEN: ${{ secrets.ORG_JODIDANIEL_READWRITE_CONTENTS_PRS }}
          # NOTE: previously referenced ORG_JODIDANIEL_READONLY_CONTENTS_PRS which
          # lacked write access — push and PR creation would silently fail.
        run: |
          chmod +x scripts/sync.sh scripts/build-agents-md.sh
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ./scripts/sync.sh --dry-run
          else
            ./scripts/sync.sh
          fi
