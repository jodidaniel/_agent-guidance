name: Nightly drift report

on:
  schedule:
    - cron: "0 6 * * *"       # 06:00 UTC daily
  workflow_dispatch:           # manual trigger

permissions:
  contents: write              # needed to commit drift-report.md

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Generate drift report
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SYNC_TOKEN }}
        run: |
          chmod +x scripts/drift-report.sh scripts/build-agents-md.sh
          ./scripts/drift-report.sh

      - name: Commit and push drift report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drift-report.md
          git diff --cached --quiet && echo "No changes to report." && exit 0
          git commit -m "chore: update drift report [skip ci]"
          git push
