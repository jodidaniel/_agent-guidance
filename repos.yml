# repos.yml — Registry of repositories that receive managed AGENTS.md syncs.
#
# Each entry names a GitHub repo and optionally provides fallback sections
# used when the repo has no .agents-sync.yml of its own.
#
# Schema:
#   repos:
#     - name: <owner/repo>
#       default_sections:          # optional
#         - <section-name>         # must match a file in agents-md/sections/

repos: []
  # Examples:
  # - name: my-org/backend-api
  #   default_sections:
